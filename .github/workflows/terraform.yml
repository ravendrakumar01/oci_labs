name: 🏗️ Terraform OCI Pipeline

on:
 push:
   branches: [main]
 pull_request:
   branches: [main]

env:
 TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
 TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
 TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
 TF_VAR_region: ${{ secrets.OCI_REGION }}
 TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
 AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}    
 AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 

jobs:
 terraform-plan:
   name: 🔍 Terraform Plan
   runs-on: ubuntu-latest
   steps:
     - name: ⬇️ Checkout code
       uses: actions/checkout@v4

     - name: ⚙️ Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.9.0

     - name: 🔑 Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: 📦 Terraform Init
       id: init
       run: terraform init

     - name: ✅ Terraform Validate
       id: validate
       run: terraform validate -no-color

     - name: 📝 Terraform Plan
       id: plan
       run: terraform plan -no-color
       continue-on-error: true
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: 📊 Generate Plan Summary
       run: |
         echo "## 🏗️ Terraform Plan Results" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| 📋 Item | 📝 Details |" >> $GITHUB_STEP_SUMMARY
         echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
         echo "| **Triggered By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Commit** | \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Date** | \`$(date -u '+%Y-%m-%d %H:%M UTC')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Init** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
         echo "| **Validate** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
         echo "| **Plan** | ${{ steps.plan.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "<details><summary>📋 Click to expand Terraform Plan output</summary>" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo '```hcl' >> $GITHUB_STEP_SUMMARY
         echo "${{ steps.plan.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY
         echo '```' >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "</details>" >> $GITHUB_STEP_SUMMARY

     - name: ❌ Plan Status Check
       if: steps.plan.outcome == 'failure'
       run: exit 1

 terraform-apply:
   name: 🚀 Terraform Apply
   runs-on: ubuntu-latest
   needs: terraform-plan
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   environment: DEV
   steps:
     - name: ⬇️ Checkout code
       uses: actions/checkout@v4

     - name: ⚙️ Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.9.0

     - name: 🔑 Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: 📦 Terraform Init
       run: terraform init

     - name: 🚀 Terraform Apply
       id: apply
       run: terraform apply -auto-approve -no-color
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: 📊 Generate Apply Summary
       if: always()
       run: |
         echo "## 🚀 Terraform Apply Results" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| 📋 Item | 📝 Details |" >> $GITHUB_STEP_SUMMARY
         echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
         echo "| **Environment** | \`DEV\` 🌍 |" >> $GITHUB_STEP_SUMMARY
         echo "| **Approved By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Commit** | \`$(echo ${{ github.sha }} | cut -c1-7)\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Date** | \`$(date -u '+%Y-%m-%d %H:%M UTC')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **Status** | ${{ steps.apply.outcome == 'success' && '✅ Applied Successfully' || '❌ Apply Failed' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.apply.outcome }}" == "success" ]; then
           echo "> ✅ **Infrastructure deployed successfully!**" >> $GITHUB_STEP_SUMMARY
         else
           echo "> ❌ **Apply failed — check logs above.**" >> $GITHUB_STEP_SUMMARY
         fi