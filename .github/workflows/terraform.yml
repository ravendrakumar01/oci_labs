name: 🏗️ Terraform OCI Pipeline

on:
 push:
   branches: [main]
 pull_request:
   branches: [main]

env:
 TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
 TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
 TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
 TF_VAR_region: ${{ secrets.OCI_REGION }}
 TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
 AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
 AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
 # ═══════════════════════════════════════════════════════
 # STAGE 1: Lint & Validate
 # ═══════════════════════════════════════════════════════
 validate:
   name: 🔎 Lint & Validate
   runs-on: ubuntu-latest
   steps:
     - name: ⬇️ Checkout Code
       uses: actions/checkout@v4

     - name: ⚙️ Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7

     - name: 🔑 Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: 📦 Terraform Init
       run: terraform init

     - name: 📐 Terraform Format Check
       id: fmt
       run: terraform fmt -check -diff
       continue-on-error: true

     - name: ✅ Terraform Validate
       id: validate
       run: terraform validate -no-color

     - name: 🔒 Security Scan (tfsec)
       uses: aquasecurity/tfsec-action@v1.0.3
       with:
         soft_fail: true

     - name: 📊 Validation Summary
       if: always()
       run: |
         echo "## 🔎 Validation & Security Results" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
         echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY
         echo "| 📐 Format | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '⚠️ Needs formatting' }} | \`terraform fmt -check\` |" >> $GITHUB_STEP_SUMMARY
         echo "| ✅ Validate | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | \`terraform validate\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 🔒 Security | ✅ Scanned | \`tfsec\` |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| 📋 Info | 📝 Value |" >> $GITHUB_STEP_SUMMARY
         echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
         echo "| **🧑 Actor** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **🌿 Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **📌 Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| **📅 Date** | \`$(date -u '+%Y-%m-%d %H:%M UTC')\` |" >> $GITHUB_STEP_SUMMARY

 # ═══════════════════════════════════════════════════════
 # STAGE 2: Terraform Plan
 # ═══════════════════════════════════════════════════════
 plan:
   name: 📝 Terraform Plan
   runs-on: ubuntu-latest
   needs: validate
   steps:
     - name: ⬇️ Checkout Code
       uses: actions/checkout@v4

     - name: ⚙️ Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7

     - name: 🔑 Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: 📦 Terraform Init
       run: terraform init

     - name: 📝 Terraform Plan
       id: plan
       run: terraform plan -no-color
       continue-on-error: true
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: 📊 Plan Summary
       if: always()
       run: |
         echo "## 📝 Terraform Plan Results" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| 📋 Item | 📝 Details |" >> $GITHUB_STEP_SUMMARY
         echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
         echo "| **🧑 Triggered By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **🌿 Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **📌 Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| **📅 Date** | \`$(date -u '+%Y-%m-%d %H:%M UTC')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **📝 Plan Status** | ${{ steps.plan.outcome == 'success' && '✅ Success — No errors' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "<details><summary>📋 Click to see full Terraform Plan output</summary>" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo '```hcl' >> $GITHUB_STEP_SUMMARY
         echo "${{ steps.plan.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY
         echo '```' >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "</details>" >> $GITHUB_STEP_SUMMARY

     - name: 💬 Comment Plan on PR
       if: github.event_name == 'pull_request'
       uses: actions/github-script@v7
       with:
         github-token: ${{ secrets.GITHUB_TOKEN }}
         script: |
           const planOutput = `${{ steps.plan.outputs.stdout }}`;
           const truncated = planOutput.length > 60000 
             ? planOutput.substring(0, 60000) + "\n\n... (truncated)" 
             : planOutput;
           
           const body = `## 🏗️ Terraform Plan — Pull Request Review
           
           **🌿 Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`
           **🧑 Author:** @${{ github.actor }}
           **📅 Date:** \`${new Date().toISOString().slice(0, 16)} UTC\`
           
           ---
           
           ### 📊 Results
           
           | Step | Status |
           |------|--------|
           | 📐 Format | ${{ steps.fmt.outcome == 'success' && '✅' || '⚠️' }} |
           | ✅ Validate | ✅ |
           | 📝 Plan | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} |
           
           ---
           
           <details><summary>📋 Show Full Plan Output</summary>
           
           \`\`\`hcl
           ${truncated}
           \`\`\`
           
           </details>
           
           ---
           > 🤖 *Auto-generated by Terraform OCI Pipeline*
           > 💡 *Merge this PR to trigger deployment to DEV environment*`;
           
           // Find existing bot comment and update, or create new
           const { data: comments } = await github.rest.issues.listComments({
             owner: context.repo.owner,
             repo: context.repo.repo,
             issue_number: context.issue.number,
           });
           
           const botComment = comments.find(c => c.body.includes('Terraform Plan — Pull Request Review'));
           
           if (botComment) {
             await github.rest.issues.updateComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               comment_id: botComment.id,
               body: body
             });
           } else {
             await github.rest.issues.createComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               issue_number: context.issue.number,
               body: body
             });
           }

     - name: ❌ Plan Status Check
       if: steps.plan.outcome == 'failure'
       run: exit 1

 # ═══════════════════════════════════════════════════════
 # STAGE 3: Terraform Apply (with Approval Gate)
 # ═══════════════════════════════════════════════════════
 apply:
   name: 🚀 Terraform Apply
   runs-on: ubuntu-latest
   needs: plan
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   environment: DEV
   steps:
     - name: ⬇️ Checkout Code
       uses: actions/checkout@v4

     - name: ⚙️ Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7

     - name: 🔑 Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: 📦 Terraform Init
       run: terraform init

     - name: 🚀 Terraform Apply
       id: apply
       run: terraform apply -auto-approve -no-color
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: 📊 Deployment Summary
       if: always()
       run: |
         echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| 📋 Item | 📝 Details |" >> $GITHUB_STEP_SUMMARY
         echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
         echo "| **🌍 Environment** | \`DEV\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **☁️ Cloud** | Oracle Cloud Infrastructure (OCI) |" >> $GITHUB_STEP_SUMMARY
         echo "| **🧑 Deployed By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **📌 Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| **📅 Date** | \`$(date -u '+%Y-%m-%d %H:%M UTC')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| **🏷️ Status** | ${{ steps.apply.outcome == 'success' && '✅ **DEPLOYED SUCCESSFULLY**' || '❌ **DEPLOYMENT FAILED**' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.apply.outcome }}" == "success" ]; then
           echo "### ✅ Infrastructure Deployed!" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "> 🎉 All resources have been successfully deployed to the **DEV** environment." >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "<details><summary>📦 Apply Output</summary>" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "${{ steps.apply.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "</details>" >> $GITHUB_STEP_SUMMARY
         else
           echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "> ⚠️ Terraform apply failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "<details><summary>🔴 Error Output</summary>" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "${{ steps.apply.outputs.stderr }}" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "</details>" >> $GITHUB_STEP_SUMMARY
         fi

     # ═══════════════════════════════════════════
     # 📧 Email Notification after Apply
     # ═══════════════════════════════════════════
     - name: 📧 Send Email Notification (Success)
       if: steps.apply.outcome == 'success'
       uses: dawidd6/action-send-mail@v3
       with:
         server_address: smtp.gmail.com
         server_port: 587
         username: ${{ secrets.EMAIL_USERNAME }}
         password: ${{ secrets.EMAIL_PASSWORD }}
         subject: "✅ Terraform Deployed — DEV Environment"
         to: ${{ secrets.NOTIFY_EMAIL }}
         from: "Terraform Pipeline <${{ secrets.EMAIL_USERNAME }}>"
         html_body: |
           <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
             
             <!-- Header -->
             <div style="background: linear-gradient(135deg, #10b981, #059669); padding: 30px; text-align: center;">
               <h1 style="color: white; margin: 0; font-size: 24px;">✅ Deployment Successful</h1>
               <p style="color: #d1fae5; margin: 8px 0 0 0; font-size: 14px;">Terraform OCI Pipeline</p>
             </div>
             
             <!-- Body -->
             <div style="padding: 30px;">
               <h2 style="color: #1f2937; margin-top: 0;">📋 Deployment Summary</h2>
               
               <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🌍 Environment</td>
                   <td style="padding: 12px;"><span style="background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-weight: bold;">DEV</span></td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">☁️ Cloud</td>
                   <td style="padding: 12px;">Oracle Cloud (OCI)</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">👤 Deployed By</td>
                   <td style="padding: 12px;">${{ github.actor }}</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">📌 Commit</td>
                   <td style="padding: 12px;"><code>${{ github.sha }}</code></td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🌿 Branch</td>
                   <td style="padding: 12px;"><code>${{ github.ref_name }}</code></td>
                 </tr>
                 <tr>
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🏷️ Status</td>
                   <td style="padding: 12px;"><span style="color: #059669; font-weight: bold; font-size: 16px;">✅ SUCCESS</span></td>
                 </tr>
               </table>
               
               <!-- Action Button -->
               <div style="text-align: center; margin: 30px 0;">
                 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" 
                    style="background: #2563eb; color: white; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px;">
                   🔗 View Pipeline Run
                 </a>
               </div>
             </div>
             
             <!-- Footer -->
             <div style="background: #f9fafb; padding: 20px; text-align: center; border-top: 1px solid #e5e7eb;">
               <p style="color: #9ca3af; margin: 0; font-size: 12px;">
                 🤖 Auto-generated by GitHub Actions | Terraform OCI Pipeline
               </p>
             </div>
           </div>

     - name: 📧 Send Email Notification (Failure)
       if: steps.apply.outcome == 'failure'
       uses: dawidd6/action-send-mail@v3
       with:
         server_address: smtp.gmail.com
         server_port: 587
         username: ${{ secrets.EMAIL_USERNAME }}
         password: ${{ secrets.EMAIL_PASSWORD }}
         subject: "❌ Terraform FAILED — DEV Environment"
         to: ${{ secrets.NOTIFY_EMAIL }}
         from: "Terraform Pipeline <${{ secrets.EMAIL_USERNAME }}>"
         html_body: |
           <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
             
             <!-- Header -->
             <div style="background: linear-gradient(135deg, #ef4444, #dc2626); padding: 30px; text-align: center;">
               <h1 style="color: white; margin: 0; font-size: 24px;">❌ Deployment Failed</h1>
               <p style="color: #fecaca; margin: 8px 0 0 0; font-size: 14px;">Terraform OCI Pipeline</p>
             </div>
             
             <!-- Body -->
             <div style="padding: 30px;">
               <h2 style="color: #1f2937; margin-top: 0;">⚠️ Failure Details</h2>
               
               <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🌍 Environment</td>
                   <td style="padding: 12px;"><span style="background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 20px; font-weight: bold;">DEV</span></td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">👤 Triggered By</td>
                   <td style="padding: 12px;">${{ github.actor }}</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">📌 Commit</td>
                   <td style="padding: 12px;"><code>${{ github.sha }}</code></td>
                 </tr>
                 <tr>
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🏷️ Status</td>
                   <td style="padding: 12px;"><span style="color: #dc2626; font-weight: bold; font-size: 16px;">❌ FAILED</span></td>
                 </tr>
               </table>
               
               <div style="background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin: 20px 0;">
                 <p style="color: #991b1b; margin: 0; font-weight: bold;">🔴 Action Required</p>
                 <p style="color: #7f1d1d; margin: 8px 0 0 0;">Please check the pipeline logs for error details and fix the issue.</p>
               </div>
               
               <!-- Action Button -->
               <div style="text-align: center; margin: 30px 0;">
                 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" 
                    style="background: #dc2626; color: white; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px;">
                   🔗 View Error Logs
                 </a>
               </div>
             </div>
             
             <!-- Footer -->
             <div style="background: #f9fafb; padding: 20px; text-align: center; border-top: 1px solid #e5e7eb;">
               <p style="color: #9ca3af; margin: 0; font-size: 12px;">
                 🤖 Auto-generated by GitHub Actions | Terraform OCI Pipeline
               </p>
             </div>
           </div>