name: Terraform OCI Pipeline

on:
 push:
   branches: [main]
 pull_request:
   branches: [main]

env:
 TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
 TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
 TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
 TF_VAR_region: ${{ secrets.OCI_REGION }}
 TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
 AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
 AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
 validate:
   name: Lint and Validate
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4

     - name: Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7
         terraform_wrapper: false

     - name: Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: Terraform Init
       run: terraform init

     - name: Terraform Format Check
       id: fmt
       run: terraform fmt -check -diff
       continue-on-error: true

     - name: Terraform Validate
       id: validate
       run: terraform validate -no-color

     - name: Security Scan (tfsec)
       uses: aquasecurity/tfsec-action@v1.0.3
       with:
         soft_fail: true

     - name: Validation Summary
       if: always()
       run: |
         echo "# 🛡️ Validation & Security Report" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
         echo "> Pipeline validation completed for commit \`$(echo ${{ github.sha }} | cut -c1-7)\` on branch \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 📋 Quality Checks" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| # | Check | Status | Tool |" >> $GITHUB_STEP_SUMMARY
         echo "|:-:|-------|:------:|------|" >> $GITHUB_STEP_SUMMARY
         echo "| 1 | Code Formatting | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '⚠️ Warning' }} | \`terraform fmt\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 2 | Configuration Validation | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | \`terraform validate\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 3 | Security Scanning | ✅ Completed | \`tfsec\` |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 🔍 Run Information" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| | Property | Value |" >> $GITHUB_STEP_SUMMARY
         echo "|:-:|----------|-------|" >> $GITHUB_STEP_SUMMARY
         echo "| 👤 | **Actor** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 🌿 | **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 📌 | **Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| 🕐 | **Date (IST)** | \`$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| ☁️ | **Provider** | Oracle Cloud (OCI) |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.fmt.outcome }}" != "success" ]; then
           echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
           echo "> Code formatting issues detected. Run \`terraform fmt\` locally to fix." >> $GITHUB_STEP_SUMMARY
         else
           echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
           echo "> All checks passed successfully. Code is ready for planning." >> $GITHUB_STEP_SUMMARY
         fi

 plan:
   name: Terraform Plan
   runs-on: ubuntu-latest
   needs: validate
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4

     - name: Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7
         terraform_wrapper: false

     - name: Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: Terraform Init
       run: terraform init

     - name: Terraform Plan
       id: plan
       run: |
         set +e
         terraform plan -no-color 2>&1 | tee /tmp/plan_output.txt
         EXITCODE=$?
         exit $EXITCODE
       continue-on-error: true
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: Plan Summary
       if: always()
       run: |
         PLAN_OUTPUT=$(cat /tmp/plan_output.txt 2>/dev/null || echo "No output captured")
         PLAN_SUMMARY=$(echo "$PLAN_OUTPUT" | grep -E "Plan:|No changes" | head -1 || echo "Check logs")
         RESOURCES_COUNT=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to add)' | head -1 || true)
         CHANGE_COUNT=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to change)' | head -1 || true)
         DESTROY_COUNT=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to destroy)' | head -1 || true)
         if [ -z "$RESOURCES_COUNT" ]; then RESOURCES_COUNT="0"; fi
         if [ -z "$CHANGE_COUNT" ]; then CHANGE_COUNT="0"; fi
         if [ -z "$DESTROY_COUNT" ]; then DESTROY_COUNT="0"; fi

         echo "# 📝 Terraform Plan Results" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.plan.outcome }}" == "success" ]; then
           echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
           echo "> Plan completed successfully with no errors." >> $GITHUB_STEP_SUMMARY
         else
           echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
           echo "> Plan failed. Check the output below for errors." >> $GITHUB_STEP_SUMMARY
         fi
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 📊 Planned Changes" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| Action | Count | Indicator |" >> $GITHUB_STEP_SUMMARY
         echo "|--------|:-----:|:---------:|" >> $GITHUB_STEP_SUMMARY
         echo "| ➕ Resources to Add | **${RESOURCES_COUNT}** | $( [ "$RESOURCES_COUNT" != "0" ] && echo '🟢' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "| 🔄 Resources to Change | **${CHANGE_COUNT}** | $( [ "$CHANGE_COUNT" != "0" ] && echo '🟡' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "| 🗑️ Resources to Destroy | **${DESTROY_COUNT}** | $( [ "$DESTROY_COUNT" != "0" ] && echo '🔴' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 🔍 Run Details" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| | Property | Value |" >> $GITHUB_STEP_SUMMARY
         echo "|:-:|----------|-------|" >> $GITHUB_STEP_SUMMARY
         echo "| 👤 | **Triggered By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 🌿 | **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 📌 | **Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| 🕐 | **Date (IST)** | \`$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 📝 | **Plan Status** | ${{ steps.plan.outcome == 'success' && '✅ **Success — No errors**' || '❌ **Failed**' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "<details><summary>📋 <strong>Click to see full Terraform Plan output</strong></summary>" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo '```hcl' >> $GITHUB_STEP_SUMMARY
         echo "$PLAN_OUTPUT" >> $GITHUB_STEP_SUMMARY
         echo '```' >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "</details>" >> $GITHUB_STEP_SUMMARY

     - name: Comment Plan on PR
       if: github.event_name == 'pull_request'
       uses: actions/github-script@v7
       with:
         github-token: ${{ secrets.GITHUB_TOKEN }}
         script: |
           const fs = require('fs');
           let planOutput = '';
           try {
             planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
           } catch (e) {
             planOutput = 'Plan output not available';
           }
           const truncated = planOutput.length > 60000
             ? planOutput.substring(0, 60000) + "\n\n... (truncated)"
             : planOutput;

           const istDate = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

           const body = `## Terraform Plan - Pull Request Review\n\n**Branch:** \`${{ github.head_ref }}\` to \`${{ github.base_ref }}\`\n**Author:** @${{ github.actor }}\n**Date:** \`${istDate} IST\`\n\n---\n\n| Step | Status |\n|------|--------|\n| Format | ${{ steps.fmt.outcome == 'success' && 'Passed' || 'Warning' }} |\n| Validate | Passed |\n| Plan | ${{ steps.plan.outcome == 'success' && 'Passed' || 'Failed' }} |\n\n---\n\n<details><summary>Show Full Plan Output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>\n\n---\n> Auto-generated by Terraform OCI Pipeline`;

           const { data: comments } = await github.rest.issues.listComments({
             owner: context.repo.owner,
             repo: context.repo.repo,
             issue_number: context.issue.number,
           });

           const botComment = comments.find(c => c.body.includes('Terraform Plan - Pull Request Review'));

           if (botComment) {
             await github.rest.issues.updateComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               comment_id: botComment.id,
               body: body
             });
           } else {
             await github.rest.issues.createComment({
               owner: context.repo.owner,
               repo: context.repo.repo,
               issue_number: context.issue.number,
               body: body
             });
           }

     - name: Plan Status Check
       if: steps.plan.outcome == 'failure'
       run: exit 1

 apply:
   name: Terraform Apply
   runs-on: ubuntu-latest
   needs: plan
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   environment: DEV
   steps:
     - name: Checkout Code
       uses: actions/checkout@v4

     - name: Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: 1.5.7
         terraform_wrapper: false

     - name: Configure OCI API Key
       run: |
         mkdir -p ~/.oci
         echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
         chmod 600 ~/.oci/oci_api_key.pem

     - name: Terraform Init
       run: terraform init

     - name: Terraform Apply
       id: apply
       run: |
         set +e
         terraform apply -auto-approve -no-color 2>&1 | tee /tmp/apply_output.txt
         EXITCODE=$?
         exit $EXITCODE
       env:
         TF_VAR_private_key_path: ~/.oci/oci_api_key.pem

     - name: Parse Apply Output
       id: parse
       if: always()
       run: |
         APPLY_OUTPUT=$(cat /tmp/apply_output.txt 2>/dev/null || echo "No output captured")

         # Get counts
         ADDED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= added)' | head -1 || echo "0")
         CHANGED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= changed)' | head -1 || echo "0")
         DESTROYED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= destroyed)' | head -1 || echo "0")
         if [ -z "$ADDED" ]; then ADDED="0"; fi
         if [ -z "$CHANGED" ]; then CHANGED="0"; fi
         if [ -z "$DESTROYED" ]; then DESTROYED="0"; fi

         echo "added<<ENDOFADDED" >> $GITHUB_OUTPUT
         echo "$ADDED" >> $GITHUB_OUTPUT
         echo "ENDOFADDED" >> $GITHUB_OUTPUT

         echo "changed<<ENDOFCHANGED" >> $GITHUB_OUTPUT
         echo "$CHANGED" >> $GITHUB_OUTPUT
         echo "ENDOFCHANGED" >> $GITHUB_OUTPUT

         echo "destroyed<<ENDOFDESTROYED" >> $GITHUB_OUTPUT
         echo "$DESTROYED" >> $GITHUB_OUTPUT
         echo "ENDOFDESTROYED" >> $GITHUB_OUTPUT

         # Extract resource details for email
         CREATED_LIST=$(echo "$APPLY_OUTPUT" | grep "Creation complete" | grep -oP 'oci_\w+\.\w+' | sort -u || true)
         if [ -z "$CREATED_LIST" ]; then CREATED_LIST=""; fi
         echo "created_list<<ENDOFCREATEDLIST" >> $GITHUB_OUTPUT
         echo "$CREATED_LIST" >> $GITHUB_OUTPUT
         echo "ENDOFCREATEDLIST" >> $GITHUB_OUTPUT

         UPDATED_LIST=$(echo "$APPLY_OUTPUT" | grep "Modifications complete" | grep -oP 'oci_\w+\.\w+' | sort -u || true)
         if [ -z "$UPDATED_LIST" ]; then UPDATED_LIST=""; fi
         echo "updated_list<<ENDOFUPDATEDLIST" >> $GITHUB_OUTPUT
         echo "$UPDATED_LIST" >> $GITHUB_OUTPUT
         echo "ENDOFUPDATEDLIST" >> $GITHUB_OUTPUT

         DESTROYED_LIST=$(echo "$APPLY_OUTPUT" | grep "Destruction complete" | grep -oP 'oci_\w+\.\w+' | sort -u || true)
         if [ -z "$DESTROYED_LIST" ]; then DESTROYED_LIST=""; fi
         echo "destroyed_list<<ENDOFDESTROYEDLIST" >> $GITHUB_OUTPUT
         echo "$DESTROYED_LIST" >> $GITHUB_OUTPUT
         echo "ENDOFDESTROYEDLIST" >> $GITHUB_OUTPUT

         # IST timestamp
         IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
         echo "ist_time<<ENDOFTIME" >> $GITHUB_OUTPUT
         echo "$IST_TIME" >> $GITHUB_OUTPUT
         echo "ENDOFTIME" >> $GITHUB_OUTPUT

     - name: Deployment Summary
       if: always()
       run: |
         APPLY_OUTPUT=$(cat /tmp/apply_output.txt 2>/dev/null || echo "No output captured")

         echo "# 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.apply.outcome }}" == "success" ]; then
           echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
           echo "> Infrastructure has been successfully deployed to **DEV** environment." >> $GITHUB_STEP_SUMMARY
         else
           echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
           echo "> Deployment to **DEV** environment has failed. Immediate attention required." >> $GITHUB_STEP_SUMMARY
         fi
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| | Property | Value |" >> $GITHUB_STEP_SUMMARY
         echo "|:-:|----------|-------|" >> $GITHUB_STEP_SUMMARY
         echo "| 🌍 | **Environment** | \`DEV\` |" >> $GITHUB_STEP_SUMMARY
         echo "| ☁️ | **Cloud** | Oracle Cloud Infrastructure (OCI) |" >> $GITHUB_STEP_SUMMARY
         echo "| 👤 | **Deployed By** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 📌 | **Commit** | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
         echo "| 🌿 | **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 🕐 | **Date (IST)** | \`${{ steps.parse.outputs.ist_time }}\` |" >> $GITHUB_STEP_SUMMARY
         echo "| 🏷️ | **Status** | ${{ steps.apply.outcome == 'success' && '✅ **DEPLOYED SUCCESSFULLY**' || '❌ **DEPLOYMENT FAILED**' }} |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "## 📦 Resource Changes" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "| Action | Count | Indicator |" >> $GITHUB_STEP_SUMMARY
         echo "|--------|:-----:|:---------:|" >> $GITHUB_STEP_SUMMARY
         echo "| ➕ Created | **${{ steps.parse.outputs.added }}** | $( [ "${{ steps.parse.outputs.added }}" != "0" ] && echo '🟢' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "| 🔄 Updated | **${{ steps.parse.outputs.changed }}** | $( [ "${{ steps.parse.outputs.changed }}" != "0" ] && echo '🟡' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "| 🗑️ Destroyed | **${{ steps.parse.outputs.destroyed }}** | $( [ "${{ steps.parse.outputs.destroyed }}" != "0" ] && echo '🔴' || echo '⚪') |" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         echo "---" >> $GITHUB_STEP_SUMMARY
         echo "" >> $GITHUB_STEP_SUMMARY
         if [ "${{ steps.apply.outcome }}" == "success" ]; then
           echo "## ✅ Infrastructure Deployed!" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "All resources have been successfully deployed to the **DEV** environment." >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "<details><summary>📄 <strong>Full Apply Output</strong></summary>" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "$APPLY_OUTPUT" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "</details>" >> $GITHUB_STEP_SUMMARY
         else
           echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
           echo "> Check the error output below and fix the issue before retrying." >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "<details><summary>🔴 <strong>Error Output</strong></summary>" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "$APPLY_OUTPUT" >> $GITHUB_STEP_SUMMARY
           echo '```' >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "</details>" >> $GITHUB_STEP_SUMMARY
         fi

     - name: Send Email (Success)
       if: steps.apply.outcome == 'success'
       uses: dawidd6/action-send-mail@v3
       with:
         server_address: smtp.gmail.com
         server_port: 587
         username: ${{ secrets.EMAIL_USERNAME }}
         password: ${{ secrets.EMAIL_PASSWORD }}
         subject: "✅ Terraform Deployed — DEV | +${{ steps.parse.outputs.added }} ~${{ steps.parse.outputs.changed }} -${{ steps.parse.outputs.destroyed }}"
         to: ${{ secrets.NOTIFY_EMAIL }}
         from: "Terraform Pipeline <${{ secrets.EMAIL_USERNAME }}>"
         html_body: |
           <div style="font-family: Segoe UI, Arial, sans-serif; max-width: 650px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
             <div style="background: linear-gradient(135deg, #10b981, #059669); padding: 30px; text-align: center;">
               <h1 style="color: white; margin: 0; font-size: 24px;">✅ Deployment Successful</h1>
               <p style="color: #d1fae5; margin: 8px 0 0 0; font-size: 14px;">Terraform OCI Pipeline — DEV Environment</p>
             </div>
             <div style="padding: 30px;">
               <h2 style="color: #1f2937; margin-top: 0;">📋 Deployment Details</h2>
               <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🌍 Environment</td>
                   <td style="padding: 12px;"><span style="background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; font-weight: bold;">DEV</span></td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">☁️ Cloud Provider</td>
                   <td style="padding: 12px;">Oracle Cloud Infrastructure (OCI)</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">👤 Deployed By</td>
                   <td style="padding: 12px;">${{ github.actor }}</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🌿 Branch</td>
                   <td style="padding: 12px;">${{ github.ref_name }}</td>
                 </tr>
                 <tr style="border-bottom: 1px solid #f3f4f6;">
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">📌 Commit</td>
                   <td style="padding: 12px;">${{ github.sha }}</td>
                 </tr>
                 <tr>
                   <td style="padding: 12px; font-weight: bold; color: #6b7280;">🏷️ Status</td>
                   <td style="padding: 12px;"><span style="color: #059669; font-weight: bold; font-size: 16px;">✅ SUCCESS</span></td>
                 </tr>
               </table>
               <h2 style="color: #1f2937; margin-top: 30px;">📦 Resource Changes Summary</h2>
               <table style="width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid #e5e7eb;">
                 <tr>
                   <td style="padding: 20px; text-align: center; width: 33%; border-right: 1px solid #e5e7eb;">
                     <div style="color: #10b981; font-size: 28px; font-weight: bold;">${{ steps.parse.outputs.added }}</div>
                     <div style="color: #6b7280; font-size: 12px; margin-top: 4px;">+ CREATED</div>
                   </td>
                   <td style="padding: 20px; text-align: center; width: 33%; border-right: 1px solid #e5e7eb;">
                     <div style="color: #f59e0b; font-size: 28px; font-weight: bold;">${{ steps.parse.outputs.changed }}</div>
                     <div style="color: #6b7280; font-size: 12px; margin-top: 4px;">📝 UPDATED</div>
                   </td>
                   <td style="padding: 20px; text-align: center; width: 33%;">
                     <div style="color: #ef4444; font-size: 28px; font-weight: bold;">${{ steps.parse.outputs.destroyed }}</div>
                     <div style="color: #6b7280; font-size: 12px; margin-top: 4px;">🗑️ DESTROYED</div>
                   </td>
                 </tr>
               </table>
               <h2 style="color: #1f2937; margin-top: 30px;">📋 Resource Details</h2>
               <table style="width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid #e5e7eb;">
                 <thead>
                   <tr style="background: #f9fafb;">
