name: Terraform OCI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_region: ${{ secrets.OCI_REGION }}
  TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  # Required for OCI Object Storage (S3-compat) with newer AWS SDK v2:
  # disables aws-chunked checksum encoding that OCI rejects (501 NotImplemented).
  AWS_REQUEST_CHECKSUM_CALCULATION: when_required
  AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
  TF_VERSION: 1.15.6

jobs:
  # ==========================================================
  #  1) Detect which environments changed in this push / PR
  # ==========================================================
  detect:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set.outputs.environments }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev:
              - 'envs/dev/**'
              - 'modules/**'
            prod:
              - 'envs/prod/**'
              - 'modules/**'
            test:
              - 'envs/test/**'
              - 'modules/**'

      - name: Build Environment Matrix
        id: set
        run: |
          envs=()
          if [ "${{ steps.filter.outputs.dev }}" == "true" ]; then envs+=("dev"); fi
          if [ "${{ steps.filter.outputs.prod }}" == "true" ]; then envs+=("prod"); fi
          if [ "${{ steps.filter.outputs.test }}" == "true" ]; then envs+=("test"); fi
          if [ ${#envs[@]} -eq 0 ]; then
            echo "environments=[]" >> $GITHUB_OUTPUT
            echo "No environment changes detected."
          else
            json=$(printf '%s\n' "${envs[@]}" | jq -R . | jq -cs .)
            echo "environments=$json" >> $GITHUB_OUTPUT
            echo "Changed environments: ${envs[*]}"
          fi

  # ==========================================================
  #  2) Validate + security scan (per changed environment)
  # ==========================================================
  validate:
    name: Validate (${{ matrix.environment }})
    needs: detect
    if: needs.detect.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect.outputs.environments) }}
    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
          working_directory: envs/${{ matrix.environment }}

      - name: Validation Summary
        if: always()
        run: |
          echo "# 🛡️ Validation Report — \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Check | Status | Tool |" >> $GITHUB_STEP_SUMMARY
          echo "|:-:|-------|:------:|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Code Formatting | ${{ steps.fmt.outcome == 'success' && '✅ Passed' || '⚠️ Warning' }} | \`terraform fmt\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Configuration Validation | ${{ steps.validate.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | \`terraform validate\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Security Scanning | ✅ Completed | \`tfsec\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Actor | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📌 Commit | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Date (IST) | \`$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')\` |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================
  #  3) Plan (per changed environment) — saves plan artifact
  # ==========================================================
  plan:
    name: Plan (${{ matrix.environment }})
    needs: [detect, validate]
    if: needs.detect.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect.outputs.environments) }}
    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure OCI API Key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan_output.txt
          EXITCODE=${PIPESTATUS[0]}
          exit $EXITCODE
        continue-on-error: true

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            envs/${{ matrix.environment }}/tfplan
            envs/${{ matrix.environment }}/plan_output.txt
          retention-days: 5

      - name: Plan Summary
        if: always()
        run: |
          PLAN_OUTPUT=$(cat plan_output.txt 2>/dev/null || echo "No output captured")
          ADD=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to add)' | head -1 || true)
          CHG=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to change)' | head -1 || true)
          DES=$(echo "$PLAN_OUTPUT" | grep -oP '\d+(?= to destroy)' | head -1 || true)
          [ -z "$ADD" ] && ADD="0"
          [ -z "$CHG" ] && CHG="0"
          [ -z "$DES" ] && DES="0"

          echo "# 📝 Plan Results — \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.plan.outcome }}" == "success" ]; then
            echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
            echo "> Plan completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
            echo "> Plan failed. Check the output below." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Action | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|:-----:|" >> $GITHUB_STEP_SUMMARY
          echo "| ➕ Add | **$ADD** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Change | **$CHG** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗑️ Destroy | **$DES** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>📋 Full Plan Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          echo "$PLAN_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const env = '${{ matrix.environment }}';
            let planOutput = '';
            try {
              planOutput = fs.readFileSync('envs/' + env + '/plan_output.txt', 'utf8');
            } catch (e) {
              planOutput = 'Plan output not available';
            }
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + "\n\n... (truncated)"
              : planOutput;
            const istDate = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
            const marker = `Terraform Plan (${env})`;
            const body = `## ${marker}\n\n**Branch:** \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\`\n**Author:** @${{ github.actor }}\n**Date:** \`${istDate} IST\`\n\n| Step | Status |\n|------|--------|\n| Format | ${{ steps.fmt.outcome == 'success' && 'Passed' || 'Warning' }} |\n| Validate | ${{ steps.validate.outcome == 'success' && 'Passed' || 'Failed' }} |\n| Plan | ${{ steps.plan.outcome == 'success' && 'Passed' || 'Failed' }} |\n\n<details><summary>Show Full Plan Output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>\n\n> Auto-generated by Terraform OCI Pipeline`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes(marker));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ==========================================================
  #  4) Apply (only on push to main) — uses the saved plan
  #     Each environment is gated by its own GitHub Environment
  # ==========================================================
  apply:
    name: Apply (${{ matrix.environment }})
    needs: [detect, plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect.outputs.environments != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.detect.outputs.environments) }}
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure OCI API Key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: envs/${{ matrix.environment }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        id: apply
        run: |
          set +e
          terraform apply -input=false -no-color tfplan 2>&1 | tee apply_output.txt
          EXITCODE=${PIPESTATUS[0]}
          exit $EXITCODE

      - name: Parse Apply Output
        id: parse
        if: always()
        run: |
          APPLY_OUTPUT=$(cat apply_output.txt 2>/dev/null || echo "No output captured")
          ADDED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= added)' | head -1 || true)
          CHANGED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= changed)' | head -1 || true)
          DESTROYED=$(echo "$APPLY_OUTPUT" | grep -oP '\d+(?= destroyed)' | head -1 || true)
          [ -z "$ADDED" ] && ADDED="0"
          [ -z "$CHANGED" ] && CHANGED="0"
          [ -z "$DESTROYED" ] && DESTROYED="0"
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "destroyed=$DESTROYED" >> $GITHUB_OUTPUT
          echo "ist_time=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        if: always()
        run: |
          APPLY_OUTPUT=$(cat apply_output.txt 2>/dev/null || echo "No output captured")
          echo "# 🚀 Deployment Report — \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
            echo "> Infrastructure deployed to **${{ matrix.environment }}**." >> $GITHUB_STEP_SUMMARY
          else
            echo "> [!CAUTION]" >> $GITHUB_STEP_SUMMARY
            echo "> Deployment to **${{ matrix.environment }}** failed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Action | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|:-----:|" >> $GITHUB_STEP_SUMMARY
          echo "| ➕ Created | **${{ steps.parse.outputs.added }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Updated | **${{ steps.parse.outputs.changed }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗑️ Destroyed | **${{ steps.parse.outputs.destroyed }}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Environment | \`${{ matrix.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Deployed By | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📌 Commit | [\`$(echo ${{ github.sha }} | cut -c1-7)\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Date (IST) | \`${{ steps.parse.outputs.ist_time }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Status | ${{ steps.apply.outcome == 'success' && '✅ **SUCCESS**' || '❌ **FAILED**' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>📄 Full Apply Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$APPLY_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Send Email (Success)
        if: steps.apply.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Terraform Deployed — ${{ matrix.environment }} | +${{ steps.parse.outputs.added }} ~${{ steps.parse.outputs.changed }} -${{ steps.parse.outputs.destroyed }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Terraform Pipeline <${{ secrets.EMAIL_USERNAME }}>"
          html_body: |
            <div style="font-family: Segoe UI, Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
              <div style="background: linear-gradient(135deg, #10b981, #059669); padding: 28px; text-align: center;">
                <h1 style="color: #ffffff; margin: 0; font-size: 22px;">✅ Deployment Successful</h1>
                <p style="color: #d1fae5; margin: 8px 0 0 0; font-size: 14px;">Terraform OCI Pipeline — ${{ matrix.environment }}</p>
              </div>
              <div style="padding: 28px;">
                <table style="width: 100%; border-collapse: collapse;">
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">🌍 Environment</td><td style="padding: 10px;">${{ matrix.environment }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">☁️ Cloud</td><td style="padding: 10px;">Oracle Cloud Infrastructure (OCI)</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">👤 Deployed By</td><td style="padding: 10px;">${{ github.actor }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">🌿 Branch</td><td style="padding: 10px;">${{ github.ref_name }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">📌 Commit</td><td style="padding: 10px;">${{ github.sha }}</td></tr>
                  <tr><td style="padding: 10px; font-weight: bold; color: #6b7280;">🕐 Date (IST)</td><td style="padding: 10px;">${{ steps.parse.outputs.ist_time }}</td></tr>
                </table>
                <table style="width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #e5e7eb;">
                  <tr>
                    <td style="padding: 18px; text-align: center; width: 33%; border-right: 1px solid #e5e7eb;">
                      <div style="color: #10b981; font-size: 26px; font-weight: bold;">${{ steps.parse.outputs.added }}</div>
                      <div style="color: #6b7280; font-size: 12px;">➕ CREATED</div>
                    </td>
                    <td style="padding: 18px; text-align: center; width: 33%; border-right: 1px solid #e5e7eb;">
                      <div style="color: #f59e0b; font-size: 26px; font-weight: bold;">${{ steps.parse.outputs.changed }}</div>
                      <div style="color: #6b7280; font-size: 12px;">🔄 UPDATED</div>
                    </td>
                    <td style="padding: 18px; text-align: center; width: 33%;">
                      <div style="color: #ef4444; font-size: 26px; font-weight: bold;">${{ steps.parse.outputs.destroyed }}</div>
                      <div style="color: #6b7280; font-size: 12px;">🗑️ DESTROYED</div>
                    </td>
                  </tr>
                </table>
              </div>
            </div>

      - name: Send Email (Failure)
        if: steps.apply.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Terraform Deployment FAILED — ${{ matrix.environment }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Terraform Pipeline <${{ secrets.EMAIL_USERNAME }}>"
          html_body: |
            <div style="font-family: Segoe UI, Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
              <div style="background: linear-gradient(135deg, #ef4444, #b91c1c); padding: 28px; text-align: center;">
                <h1 style="color: #ffffff; margin: 0; font-size: 22px;">❌ Deployment Failed</h1>
                <p style="color: #fee2e2; margin: 8px 0 0 0; font-size: 14px;">Terraform OCI Pipeline — ${{ matrix.environment }}</p>
              </div>
              <div style="padding: 28px;">
                <p style="color: #1f2937;">The Terraform apply for the <strong>${{ matrix.environment }}</strong> environment has failed. Please check the pipeline logs for details.</p>
                <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">🌍 Environment</td><td style="padding: 10px;">${{ matrix.environment }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">👤 Triggered By</td><td style="padding: 10px;">${{ github.actor }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">🌿 Branch</td><td style="padding: 10px;">${{ github.ref_name }}</td></tr>
                  <tr style="border-bottom: 1px solid #f3f4f6;"><td style="padding: 10px; font-weight: bold; color: #6b7280;">📌 Commit</td><td style="padding: 10px;">${{ github.sha }}</td></tr>
                  <tr><td style="padding: 10px; font-weight: bold; color: #6b7280;">🕐 Date (IST)</td><td style="padding: 10px;">${{ steps.parse.outputs.ist_time }}</td></tr>
                </table>
                <p style="margin-top: 20px;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="background: #ef4444; color: #ffffff; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold;">🔍 View Logs</a>
                </p>
              </div>
            </div>
