---
# Baseline playbook — runs on ANY server after Terraform provisions it.
#   1. Updates all system packages (equivalent of `yum update -y`)
#   2. Mounts an attached block volume (/dev/sdb -> /data), if present
#
# Run on all servers:     ansible-playbook playbooks/site.yml
# Run on ONE new VM:       ansible-playbook playbooks/site.yml --limit dev-app-01
- name: Baseline configuration (all servers)
  hosts: all
  become: true

  tasks:
    - name: Update all installed packages (yum/dnf update)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_only: true

    # ---------- Block volume (mount only if one is attached) ----------
    - name: Check whether a block volume is attached (/dev/sdb)
      ansible.builtin.stat:
        path: /dev/sdb
      register: block_dev

    - name: Create ext4 filesystem on the block volume (idempotent)
      community.general.filesystem:
        fstype: ext4
        dev: /dev/sdb
      when: block_dev.stat.exists

    - name: Mount the block volume at /data
      ansible.posix.mount:
        path: /data
        src: /dev/sdb
        fstype: ext4
        opts: defaults,_netdev,nofail
        state: mounted
      when: block_dev.stat.exists
