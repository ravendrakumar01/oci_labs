[defaults]
# Dynamic inventory (OCI) — IPs fetched live, no manual editing.
# For manual/static use instead:  ansible-playbook -i inventory/hosts.ini ...
inventory = inventory/oci.yml
host_key_checking = False
remote_user = opc
# Terraform-generated private key (extract it — see README)
private_key_file = ~/.ssh/dev-app-01
retry_files_enabled = False
interpreter_python = auto_silent

[inventory]
enable_plugins = oracle.oci.oci

[ssh_connection]
pipelining = True
