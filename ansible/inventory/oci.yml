# OCI Dynamic Inventory
# Ansible fetches running instances LIVE from OCI — no manual IPs.
#
# Prereqs (WSL):
#   pip install oci                                   # OCI Python SDK
#   ansible-galaxy collection install oracle.oci      # (in requirements.yml)
#   ~/.oci/config must exist (see README)
#
# Get the DEV compartment OCID to paste below:
#   terraform -chdir=envs/dev output -raw compartment_id
#
# Test:
#   ansible-inventory -i inventory/oci.yml --graph
#   ansible-inventory -i inventory/oci.yml --list

plugin: oracle.oci.oci

regions:
  - ap-mumbai-1

compartments:
  - compartment_ocid: "ocid1.compartment.oc1..aaaaaaaadnib4fy2msdvp6tetdxyaqvhc3rbvtv4ap6yndzqzb5vbi6k6qiq"
    fetch_hosted_entities: true

# Only running instances
filters:
  - lifecycle_state: "RUNNING"

# Use each instance's public IP as the SSH target (ansible_host)
hostname_format: "public_ip"

